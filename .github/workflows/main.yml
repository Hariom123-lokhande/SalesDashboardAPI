name: .NET CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    # 🔹 Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # ❌ Removed setup-dotnet (permission issue fix)

    # 🔹 Restore
    - name: Restore dependencies
      run: dotnet restore

    # 🔹 Build
    - name: Build project
      run: dotnet build --configuration Release --no-restore

    # 🔹 Publish
    - name: Publish project
      run: dotnet publish -c Release -o publish

    # 🔹 Stop IIS (safe)
    - name: Start IIS
      shell: powershell
      run: |
       iisreset /start

    # 🔹 Ensure folder exists
    - name: Ensure IIS Folder Exists
      shell: powershell
      run: |
        if (!(Test-Path "C:\inetpub\wwwroot\SalesDashboard")) {
            New-Item -ItemType Directory -Path "C:\inetpub\wwwroot\SalesDashboard"
        }

    # 🔹 Clean folder safely
    - name: Clean IIS Folder
      shell: powershell
      run: |
        if (Test-Path "C:\inetpub\wwwroot\SalesDashboard") {
            Get-ChildItem "C:\inetpub\wwwroot\SalesDashboard" -Recurse | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
        }

    # 🔹 Copy files
    - name: Copy Files to IIS
      shell: powershell
      run: |
        Copy-Item -Path "publish\*" -Destination "C:\inetpub\wwwroot\SalesDashboard" -Recurse -Force

    # 🔹 Start IIS (safe)
    - name: Start IIS Site
      shell: powershell
      run: |
        Import-Module WebAdministration
        if (Get-Website -Name "SalesDashboard" -ErrorAction SilentlyContinue) {
            Start-WebSite -Name "SalesDashboard"
        }
